<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理设置</title>
  <style>
    :root {
      --bg: #f7f5f1;
      --surface: #fdfbf8;
      --surface-muted: #f0eee8;
      --fg: #1d1b17;
      --muted: #777168;
      --border: #e5dfd6;
      --border-strong: #d8d0c5;
      --primary: #12b981;
      --primary-hover: #079467;
      --primary-soft: #e5f8f0;
      --danger: #d45549;
      --radius: 10px;
      --shadow: 0 14px 34px rgba(37, 31, 22, 0.08);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --motion-fast: 140ms;
      --motion-base: 220ms;
      color-scheme: light;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 0%, rgba(255, 255, 255, 0.74), transparent 32%),
        var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 14px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .page {
      width: min(960px, calc(100vw - 56px));
      margin: 0 auto;
      padding: 10px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 52px;
      margin-bottom: 24px;
      padding: 9px 0;
    }

    .title h1 {
      margin: 0;
      color: var(--fg);
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0;
    }

    .title p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .panel-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      flex: 0 0 auto;
    }

    .btn {
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 13px;
      border-radius: 8px;
      border: 1px solid var(--border-strong);
      background: #ebe8e2;
      color: var(--fg);
      text-decoration: none;
      font-weight: 700;
      white-space: nowrap;
      transition:
        color var(--motion-fast) var(--ease-out),
        background-color var(--motion-fast) var(--ease-out),
        border-color var(--motion-fast) var(--ease-out),
        transform var(--motion-fast) var(--ease-out);
    }

    .btn:hover {
      border-color: #cfc7bc;
      color: var(--fg);
      background: #e2ded6;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.primary {
      color: #fff;
      border-color: #c96442;
      background: #c96442;
    }

    .btn.primary:hover {
      color: #fff;
      border-color: #b35739;
      background: #b35739;
    }

    .btn svg,
    .icon-btn svg {
      width: 16px;
      height: 16px;
      stroke-width: 2;
    }

    .settings-shell {
      display: grid;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(253, 251, 248, 0.86);
      box-shadow: none;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .panel-head h2 {
      margin: 0;
      color: var(--fg);
      font-size: 16px;
      line-height: 1.3;
      font-weight: 700;
    }

    .panel-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .panel-body {
      display: grid;
      gap: 14px;
      padding: 18px 20px 20px;
      background: var(--bg);
    }

    .management-body {
      padding-bottom: 42px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: #344054;
      font-size: 13px;
      font-weight: 500;
    }

    input {
      width: 100%;
      height: 36px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      background: var(--surface);
      color: var(--fg);
      outline: none;
      padding: 0 10px;
      transition:
        border-color var(--motion-fast) var(--ease-out),
        box-shadow var(--motion-fast) var(--ease-out);
    }

    input:focus {
      border-color: #c96442;
      box-shadow: 0 0 0 4px rgba(201, 100, 66, 0.16);
    }

    .settings-helper {
      margin: -4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .secret-input-wrap {
      position: relative;
    }

    .secret-input-wrap input {
      padding-right: 58px;
    }

    .plain-toggle {
      position: absolute;
      top: 50%;
      right: 4px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 9px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      background: #f8f6f1;
      font-size: 12px;
      font-weight: 700;
      transform: translateY(-50%);
      transition:
        color var(--motion-fast) var(--ease-out),
        background-color var(--motion-fast) var(--ease-out),
        border-color var(--motion-fast) var(--ease-out);
    }

    .plain-toggle:hover {
      color: var(--fg);
      border-color: #cfc7bc;
      background: #eee9e1;
    }

    .error {
      color: var(--danger);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.35;
      min-height: 16px;
      opacity: 0;
      transform: translate3d(0, -2px, 0);
      transition:
        opacity 120ms var(--ease-out),
        transform 120ms var(--ease-out);
    }

    .error.show {
      min-height: 16px;
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }

    .error:not(.show) {
      height: 0;
      min-height: 0;
      overflow: hidden;
    }

    .pricing-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-muted);
    }

    .pricing-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
    }

    .pricing-summary {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pagination-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .page-size-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .page-size-select {
      width: 78px;
      height: 32px;
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      background: var(--surface);
      color: var(--fg);
      padding: 0 8px;
      outline: none;
    }

    .pager-button {
      height: 32px;
      padding: 0 10px;
      border-radius: 7px;
      border: 1px solid var(--border-strong);
      background: #ebe8e2;
      color: var(--fg);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pager-button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .page-info {
      min-width: 78px;
      color: #5f574d;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
    }

    .pricing-table {
      width: 100%;
      min-width: 860px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    .pricing-table tbody tr {
      background: var(--surface);
      transition: background-color var(--motion-fast) var(--ease-out);
    }

    .pricing-table tbody tr.synced {
      background: #edf8f1;
    }

    .pricing-table tbody tr:hover {
      background: #f4f0e8;
    }

    .pricing-table th {
      height: 38px;
      padding: 0 12px;
      color: #5f574d;
      background: #e9e5dc;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pricing-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .pricing-table tbody tr:last-child td {
      border-bottom: 0;
    }

    .pricing-provider-cell {
      width: 128px;
    }

    .pricing-model-cell {
      width: 210px;
    }

    .pricing-actions-cell {
      width: 72px;
      text-align: right;
    }

    .price-row-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #5f574d;
      background: #f8f6f1;
      transition:
        color var(--motion-fast) var(--ease-out),
        background-color var(--motion-fast) var(--ease-out),
        border-color var(--motion-fast) var(--ease-out),
        transform var(--motion-fast) var(--ease-out);
    }

    .icon-btn:hover {
      color: var(--fg);
      background: #eee9e1;
      transform: translateY(-1px);
    }

    .icon-btn.danger {
      color: #b8573f;
    }

    .icon-btn.danger.confirming,
    .icon-btn.danger:hover {
      color: #fff;
      border-color: #c96442;
      background: #c96442;
    }

    .icon-btn:active {
      transform: translateY(0);
    }

    .provider-input,
    .model-name-input,
    .price-input {
      width: 100%;
      height: 34px;
      padding: 0 10px;
    }

    .provider-input {
      color: #4f463d;
      font-size: 13px;
      font-weight: 600;
    }

    .model-name-input {
      color: var(--fg);
      font-size: 13px;
      font-weight: 700;
    }

    .price-input {
      font-family: var(--mono);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 80;
      transform: translate3d(-50%, 12px, 0);
      opacity: 0;
      pointer-events: none;
      padding: 10px 13px;
      border-radius: 6px;
      color: #fff;
      background: rgba(29, 27, 23, 0.92);
      box-shadow: var(--shadow);
      transition:
        opacity 180ms var(--ease-out),
        transform var(--motion-base) var(--ease-out);
      will-change: transform, opacity;
    }

    .toast.show {
      opacity: 1;
      transform: translate3d(-50%, 0, 0);
    }

    @media (max-width: 760px) {
      .page {
        width: min(100vw - 28px, 960px);
        padding-top: 14px;
      }

      .topbar,
      .panel-head {
        align-items: stretch;
        flex-direction: column;
      }

      .actions,
      .panel-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="page" data-od-id="settings-page">
    <div class="settings-shell" data-od-id="settings-shell">
      <section class="panel" data-od-id="management-key-panel">
        <div class="panel-head">
          <div>
            <h2>管理密钥</h2>
            <p>输入管理密钥后，可用于后续管理操作校验。</p>
          </div>
          <button class="btn primary" id="saveManagementKey" type="button" data-od-id="save-management-key-button">保存密钥</button>
        </div>
        <div class="panel-body management-body">
          <div class="field">
            <label for="managementKeyInput">管理密钥</label>
            <div class="secret-input-wrap" data-od-id="management-key-input-wrap">
              <input id="managementKeyInput" type="password" autocomplete="off" placeholder="输入管理密钥" data-od-id="management-key-input">
              <button class="plain-toggle" id="toggleManagementKeyPlain" type="button" aria-pressed="false" aria-label="显示管理密钥明文" data-od-id="management-key-plain-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="2.8"></circle></svg></button>
            </div>
            <p class="settings-helper">保存后不会在界面明文显示。</p>
            <div id="managementKeyError" class="error" role="alert" aria-hidden="true">请输入管理密钥。</div>
          </div>
        </div>
      </section>

      <section class="panel" data-od-id="model-pricing-settings">
        <div class="panel-head">
          <div>
            <h2>模型计费设置</h2>
            <p>价格单位为 USD / 1M tokens，可按模型独立维护。</p>
          </div>
          <div class="panel-actions" data-od-id="model-pricing-actions">
            <button class="btn" id="addPriceRule" type="button" data-od-id="add-model-price-button">新增规则</button>
            <button class="btn" id="syncModelPrices" type="button" data-od-id="sync-model-prices-button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path><path d="M3 21v-5h5"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M21 3v5h-5"></path></svg>
              同步价格
            </button>
            <button class="btn primary" id="saveModelPrices" type="button" data-od-id="save-model-prices-button">保存价格</button>
          </div>
        </div>
        <div class="panel-body">
          <div class="pricing-toolbar" data-od-id="model-pricing-pagination">
            <div class="pricing-summary" id="priceCount">0 条价格规则</div>
            <div class="pagination-controls">
              <label class="page-size-label" for="pricePageSize">
                每页
                <select class="page-size-select" id="pricePageSize">
                  <option value="25">25</option>
                  <option value="50" selected>50</option>
                  <option value="100">100</option>
                  <option value="200">200</option>
                </select>
              </label>
              <button class="pager-button" id="pricePrevPage" type="button">上一页</button>
              <span class="page-info" id="pricePageInfo">第 1 / 1 页</span>
              <button class="pager-button" id="priceNextPage" type="button">下一页</button>
            </div>
          </div>
          <div class="pricing-table-wrap" data-od-id="model-pricing-table-wrap">
            <table class="pricing-table" data-od-id="model-pricing-table">
              <thead>
                <tr>
                  <th class="pricing-provider-cell">提供商</th>
                  <th class="pricing-model-cell">模型名称</th>
                  <th>输入价格</th>
                  <th>读取缓存价格</th>
                  <th>输出价格</th>
                  <th class="pricing-actions-cell">操作</th>
                </tr>
              </thead>
              <tbody id="priceRows"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast" data-od-id="feedback-toast" role="status" aria-live="polite" aria-atomic="true">已保存</div>

  <script>
    const api = "/v0/management/plugins/cpa-toolkit";
    const sessionSecretStorageKey = "cpa-toolkit.management-key.session";
    const legacySessionSecretStorageKey = "cpa-access-manager.management-key.session";
    const legacySecretStorageKeys = ["cpa-toolkit.management-key", "cpa-access-manager.management-key"];
    const cpaAuthStorageKey = "cli-proxy-auth";
    const cpaSecurePrefix = "enc::v1::";
    const cpaSecureSalt = "cli-proxy-api-webui::secure-storage";
    const reducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    let toastTimer = null;
    const session = { apiBase: "", managementKey: "" };

    const els = {
      toast: document.getElementById("toast"),
      managementKey: document.getElementById("managementKeyInput"),
      managementKeyError: document.getElementById("managementKeyError"),
      managementKeyToggle: document.getElementById("toggleManagementKeyPlain"),
      saveManagementKey: document.getElementById("saveManagementKey"),
      priceRows: document.getElementById("priceRows"),
      priceCount: document.getElementById("priceCount"),
      pricePageSize: document.getElementById("pricePageSize"),
      pricePrevPage: document.getElementById("pricePrevPage"),
      priceNextPage: document.getElementById("priceNextPage"),
      pricePageInfo: document.getElementById("pricePageInfo"),
      addPriceRule: document.getElementById("addPriceRule"),
      syncPrices: document.getElementById("syncModelPrices"),
      savePrices: document.getElementById("saveModelPrices")
    };

    let priceRules = [];
    const priceState = { page: 1, pageSize: 50 };
    let pendingPricingDeleteIndex = null;

    function base() { return session.apiBase || location.origin; }
    function secret() { return session.managementKey; }
    function asString(value) { return typeof value === "string" ? value.trim() : ""; }
    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch]));
    }
    function parseStoredJSON(value) {
      if (typeof value !== "string") return value;
      try { return JSON.parse(value); } catch { return value; }
    }
    function cpaSecureKeyBytes() {
      return new TextEncoder().encode(`${cpaSecureSalt}|${window.location.host}|${navigator.userAgent}`);
    }
    function base64ToBytes(value) {
      const text = atob(value);
      const bytes = new Uint8Array(text.length);
      for (let i = 0; i < text.length; i += 1) bytes[i] = text.charCodeAt(i);
      return bytes;
    }
    function xorBytes(bytes, key) {
      const out = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i += 1) out[i] = bytes[i] ^ key[i % key.length];
      return out;
    }
    function decodeCPASecureValue(raw) {
      if (!raw) return null;
      let text = raw;
      if (raw.startsWith(cpaSecurePrefix)) {
        text = new TextDecoder().decode(xorBytes(base64ToBytes(raw.slice(cpaSecurePrefix.length)), cpaSecureKeyBytes()));
      }
      return parseStoredJSON(text);
    }
    function readStorageValue(storage, key) {
      try {
        const raw = storage.getItem(key);
        return raw === null ? null : decodeCPASecureValue(raw);
      } catch {
        return null;
      }
    }
    function isEmbeddedInPanel() {
      try { return window.self !== window.top; } catch { return false; }
    }
    function extractPanelAuth(value) {
      if (!value || typeof value !== "object") return null;
      const stateValue = value.state && typeof value.state === "object" ? value.state : value;
      const apiBase = asString(stateValue.apiBase);
      const managementKey = asString(stateValue.managementKey);
      return apiBase && managementKey ? { apiBase, managementKey } : null;
    }
    function readCPAPanelAuth() {
      if (!isEmbeddedInPanel()) return null;
      return extractPanelAuth(readStorageValue(window.localStorage, cpaAuthStorageKey));
    }
    function saveSessionSecret(value) {
      try { sessionStorage.setItem(sessionSecretStorageKey, value); } catch {}
    }
    function cleanupLegacySecret() {
      for (const key of legacySecretStorageKeys) {
        try { localStorage.removeItem(key); } catch {}
      }
    }
    function initSession() {
      const panelAuth = readCPAPanelAuth();
      const currentSessionSecret = asString(readStorageValue(window.sessionStorage, sessionSecretStorageKey));
      const legacySessionSecret = asString(readStorageValue(window.sessionStorage, legacySessionSecretStorageKey));
      const sessionSecret = currentSessionSecret || legacySessionSecret;
      cleanupLegacySecret();
      if (!currentSessionSecret && legacySessionSecret) saveSessionSecret(legacySessionSecret);
      if (legacySessionSecret) {
        try { sessionStorage.removeItem(legacySessionSecretStorageKey); } catch {}
      }
      session.apiBase = panelAuth?.apiBase || location.origin;
      session.managementKey = sessionSecret || panelAuth?.managementKey || "";
      els.managementKey.value = secret();
    }
    async function call(path, opts = {}) {
      cleanupLegacySecret();
      const headers = Object.assign({ "content-type": "application/json" }, opts.headers || {});
      if (secret()) headers.authorization = "Bearer " + secret();
      const res = await fetch(base() + api + path, Object.assign({}, opts, { headers }));
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { data = text; }
      if (!res.ok) throw new Error((data && data.error) || text || res.status);
      return data;
    }

    function showToast(message) {
      els.toast.textContent = message;
      if (toastTimer) window.clearTimeout(toastTimer);
      els.toast.classList.add("show");
      toastTimer = window.setTimeout(() => {
        els.toast.classList.remove("show");
        toastTimer = null;
      }, 1800);
    }

    function setError(element, visible) {
      element.classList.toggle("show", visible);
      element.setAttribute("aria-hidden", visible ? "false" : "true");
    }

    function managementKeyVisibilityIcon(visible) {
      if (visible) {
        return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M3 3l18 18"></path><path d="M10.6 10.6a2.8 2.8 0 0 0 3.8 3.8"></path><path d="M8.5 5.5A10.4 10.4 0 0 1 12 5c6 0 9.5 7 9.5 7a16 16 0 0 1-3 3.8"></path><path d="M6.1 6.9A16.2 16.2 0 0 0 2.5 12s3.5 7 9.5 7a10.8 10.8 0 0 0 4.2-.8"></path></svg>`;
      }

      return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="2.8"></circle></svg>`;
    }

    function setManagementKeyPlainVisible(visible) {
      els.managementKey.type = visible ? "text" : "password";
      els.managementKeyToggle.innerHTML = managementKeyVisibilityIcon(visible);
      els.managementKeyToggle.setAttribute("aria-pressed", visible ? "true" : "false");
      els.managementKeyToggle.setAttribute("aria-label", visible ? "隐藏管理密钥明文" : "显示管理密钥明文");
    }

    function priceNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) && number >= 0 ? number : NaN;
    }
    function priceInput(value) {
      const number = Number(value || 0);
      return Number.isFinite(number) ? number.toFixed(4).replace(/\.?0+$/, "") : "0";
    }
    function pricingActionIcon(name) {
      const icons = {
        trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 15H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>',
        alert: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 8v5"></path><path d="M12 17h.01"></path><path d="M10.3 3.6h3.4L22 19H2L10.3 3.6Z"></path></svg>'
      };
      return icons[name] || "";
    }
    function resetPendingPricingDelete() {
      pendingPricingDeleteIndex = null;
      els.priceRows.querySelectorAll("[data-action='delete-price-row']").forEach(button => {
        const row = button.closest("tr");
        const model = row?.querySelector(".model-name-input")?.value.trim() || "该模型";
        button.classList.remove("confirming");
        button.title = "删除";
        button.setAttribute("aria-label", `删除 ${model}`);
        button.innerHTML = pricingActionIcon("trash");
      });
    }
    function normalizedRule(rule = {}) {
      const provider = asString(rule.provider).toLowerCase();
      const model = asString(rule.model);
      if (!provider && !model) return null;
      const input = priceNumber(rule.input_usd_per_million ?? 0);
      const cacheRead = priceNumber(rule.cache_read_usd_per_million ?? 0);
      const output = priceNumber(rule.output_usd_per_million ?? 0);
      if (!provider || !model || Number.isNaN(input) || Number.isNaN(cacheRead) || Number.isNaN(output)) {
        throw new Error("价格规则需要填写 provider、模型名和非负价格。");
      }
      return {
        provider,
        model,
        input_usd_per_million: input,
        cache_read_usd_per_million: cacheRead,
        output_usd_per_million: output
      };
    }
    function rowHTML(rule = {}, index = 0) {
      const model = rule.model || "该模型";
      return `
        <tr data-index="${index}">
          <td class="pricing-provider-cell"><input class="provider-input" type="text" value="${esc(rule.provider || "")}" placeholder="codex" aria-label="Provider"></td>
          <td class="pricing-model-cell"><input class="model-name-input" type="text" value="${esc(rule.model || "")}" placeholder="gpt-4.1" aria-label="模型名称"></td>
          <td><input class="price-input" type="number" min="0" step="0.0001" value="${esc(priceInput(rule.input_usd_per_million))}" aria-label="输入价格"></td>
          <td><input class="price-input" type="number" min="0" step="0.0001" value="${esc(priceInput(rule.cache_read_usd_per_million))}" aria-label="读取缓存价格"></td>
          <td><input class="price-input" type="number" min="0" step="0.0001" value="${esc(priceInput(rule.output_usd_per_million))}" aria-label="输出价格"></td>
          <td class="pricing-actions-cell"><div class="price-row-actions"><button class="icon-btn danger" type="button" title="删除" aria-label="删除 ${esc(model)}" data-action="delete-price-row">${pricingActionIcon("trash")}</button></div></td>
        </tr>
      `;
    }
    function totalPricePages() {
      return Math.max(1, Math.ceil(priceRules.length / priceState.pageSize));
    }
    function updatePricePager() {
      const totalPages = totalPricePages();
      priceState.page = Math.min(Math.max(priceState.page, 1), totalPages);
      els.priceCount.textContent = `${priceRules.length} 条价格规则`;
      els.pricePageInfo.textContent = `第 ${priceState.page} / ${totalPages} 页`;
      els.pricePrevPage.disabled = priceState.page <= 1;
      els.priceNextPage.disabled = priceState.page >= totalPages;
      els.pricePageSize.value = String(priceState.pageSize);
    }
    function renderPricePage() {
      updatePricePager();
      const start = (priceState.page - 1) * priceState.pageSize;
      const list = priceRules.slice(start, start + priceState.pageSize);
      els.priceRows.innerHTML = list.length
        ? list.map((rule, offset) => rowHTML(rule, start + offset)).join("")
        : `<tr><td colspan="6" style="padding:24px;text-align:center;color:var(--muted)">暂无价格规则，可点击同步价格。</td></tr>`;
      resetPendingPricingDelete();
    }
    function renderPrices(rules) {
      priceRules = (Array.isArray(rules) ? rules : [])
        .map(rule => normalizedRule(rule))
        .filter(Boolean);
      priceState.page = 1;
      renderPricePage();
    }
    function syncVisiblePriceRows(skipIndex = null) {
      const next = priceRules.slice();
      for (const row of els.priceRows.querySelectorAll("tr[data-index]")) {
        const inputs = row.querySelectorAll("input");
        if (inputs.length !== 5) continue;
        const index = Number(row.dataset.index);
        if (!Number.isInteger(index) || index < 0 || index >= next.length) continue;
        if (index === skipIndex) continue;
        const parsed = normalizedRule({
          provider: inputs[0].value,
          model: inputs[1].value,
          input_usd_per_million: inputs[2].value,
          cache_read_usd_per_million: inputs[3].value,
          output_usd_per_million: inputs[4].value
        });
        next[index] = parsed;
      }
      priceRules = next.filter(Boolean);
      priceState.page = Math.min(priceState.page, totalPricePages());
    }
    function readPriceRows() {
      syncVisiblePriceRows();
      const rules = priceRules.map(rule => normalizedRule(rule)).filter(Boolean);
      priceRules = rules;
      renderPricePage();
      return rules;
    }
    async function loadPrices() {
      if (!secret()) {
        renderPrices([]);
        showToast("请先保存管理密钥");
        return;
      }
      const rules = await call("/prices");
      renderPrices(rules);
    }
    async function savePrices() {
      try {
        const rules = readPriceRows();
        await call("/prices", { method: "PUT", body: JSON.stringify({ rules }) });
        await loadPrices();
        showToast("模型价格已保存");
      } catch (error) {
        showToast(error.message || "保存失败");
      }
    }
    async function syncPrices() {
      try {
        els.syncPrices.disabled = true;
        els.syncPrices.textContent = "同步中";
        const result = await call("/prices/sync", { method: "POST", body: JSON.stringify({}) });
        await loadPrices();
        showToast(`已同步 ${result.synced || 0} 条价格`);
      } catch (error) {
        showToast(error.message || "同步失败");
      } finally {
        els.syncPrices.disabled = false;
        els.syncPrices.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path><path d="M3 21v-5h5"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M21 3v5h-5"></path></svg>同步价格';
      }
    }

    els.managementKeyToggle.addEventListener("click", () => {
      const nextVisible = els.managementKey.type === "password";
      setManagementKeyPlainVisible(nextVisible);
      els.managementKey.focus({ preventScroll: true });
    });

    els.saveManagementKey.addEventListener("click", async () => {
      const value = els.managementKey.value.trim();
      if (!value) {
        setError(els.managementKeyError, true);
        return;
      }
      setError(els.managementKeyError, false);
      session.managementKey = value;
      saveSessionSecret(value);
      showToast("管理密钥已保存");
      await loadPrices();
    });

    els.addPriceRule.addEventListener("click", () => {
      try {
        syncVisiblePriceRows();
        priceRules.unshift({ provider: "codex", model: "", input_usd_per_million: 0, cache_read_usd_per_million: 0, output_usd_per_million: 0 });
        priceState.page = 1;
        renderPricePage();
        const modelInput = els.priceRows.querySelector(".model-name-input");
        if (modelInput) modelInput.focus({ preventScroll: true });
      } catch (error) {
        showToast(error.message || "新增失败");
      }
    });
    els.priceRows.addEventListener("click", event => {
      const button = event.target.closest("[data-action='delete-price-row']");
      if (!button) return;

      event.stopPropagation();
      const row = button.closest("tr[data-index]");
      const index = Number(row?.dataset.index);
      if (!Number.isInteger(index) || index < 0 || index >= priceRules.length) return;

      if (pendingPricingDeleteIndex !== index) {
        resetPendingPricingDelete();
        pendingPricingDeleteIndex = index;
        const model = row.querySelector(".model-name-input")?.value.trim() || "该模型";
        button.classList.add("confirming");
        button.title = "确认删除";
        button.setAttribute("aria-label", `确认删除 ${model}`);
        button.innerHTML = pricingActionIcon("alert");
        showToast("再次点击感叹号确认删除");
        return;
      }

      try {
        syncVisiblePriceRows(index);
        const removed = priceRules[index]?.model || "该模型";
        priceRules.splice(index, 1);
        priceState.page = Math.min(priceState.page, totalPricePages());
        renderPricePage();
        showToast(`${removed} 已删除`);
      } catch (error) {
        showToast(error.message || "删除失败");
      }
    });
    document.addEventListener("click", event => {
      if (!pendingPricingDeleteIndex && pendingPricingDeleteIndex !== 0) return;
      if (event.target.closest("#priceRows [data-action='delete-price-row']")) return;
      resetPendingPricingDelete();
    });
    els.pricePrevPage.addEventListener("click", () => {
      try {
        syncVisiblePriceRows();
        priceState.page -= 1;
        renderPricePage();
      } catch (error) {
        showToast(error.message || "翻页失败");
      }
    });
    els.priceNextPage.addEventListener("click", () => {
      try {
        syncVisiblePriceRows();
        priceState.page += 1;
        renderPricePage();
      } catch (error) {
        showToast(error.message || "翻页失败");
      }
    });
    els.pricePageSize.addEventListener("change", () => {
      try {
        syncVisiblePriceRows();
        priceState.pageSize = Number(els.pricePageSize.value) || 50;
        priceState.page = 1;
        renderPricePage();
      } catch (error) {
        showToast(error.message || "切换分页失败");
      }
    });
    els.syncPrices.addEventListener("click", syncPrices);
    els.savePrices.addEventListener("click", savePrices);

    initSession();
    loadPrices().catch(error => showToast(error.message || "加载失败"));
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CPA Access Manager</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", sans-serif;
      --bg: #f5f6f7;
      --panel: #ffffff;
      --panel-soft: #fafbfc;
      --text: #20242c;
      --muted: #697281;
      --border: #dfe3ea;
      --border-strong: #c8ced8;
      --accent: #24745f;
      --accent-soft: #e7f3ef;
      --danger: #b42318;
      --danger-soft: #fff1f0;
      --warn: #8a5a00;
      --warn-soft: #fff8e1;
      --shadow: 0 1px 2px rgba(18, 25, 38, .06);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-size: 14px; }
    .app { max-width: 1240px; margin: 0 auto; padding: 20px; }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }
    h1 { font-size: 22px; line-height: 1.2; margin: 0 0 4px; letter-spacing: 0; }
    h2 { font-size: 16px; margin: 0; letter-spacing: 0; }
    label { display: block; font-size: 12px; font-weight: 650; color: var(--muted); margin-bottom: 6px; }
    input, select, textarea, button { font: inherit; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 9px 10px;
      background: #fff;
      color: inherit;
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    textarea { min-height: 180px; resize: vertical; line-height: 1.45; }
    button {
      border: 1px solid var(--border-strong);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 8px 11px;
      cursor: pointer;
      min-height: 36px;
    }
    button:hover { border-color: #aeb7c5; background: var(--panel-soft); }
    button.primary { background: var(--accent); color: white; border-color: var(--accent); }
    button.danger { color: var(--danger); border-color: #efb8b0; background: #fff; }
    button.tab {
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 6px 6px 0 0;
      padding-inline: 14px;
    }
    button.tab.active {
      color: var(--accent);
      background: var(--panel);
      border-color: var(--border);
      border-bottom-color: var(--panel);
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .muted { color: var(--muted); }
    .mono { font-family: "Cascadia Mono", Consolas, monospace; }
    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .status-pill.ok { color: var(--accent); background: var(--accent-soft); border-color: #bddbd1; }
    .notice { white-space: pre-wrap; background: #eef6ff; border: 1px solid #bfdcff; padding: 10px 12px; border-radius: 6px; margin: 10px 0; }
    .notice.error { background: var(--danger-soft); border-color: #ffccc7; color: var(--danger); }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 10px;
      margin: 12px 0 16px;
    }
    .summary-item {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
    }
    .summary-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .summary-value { font-size: 22px; font-weight: 720; line-height: 1.1; }
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-top: 8px; }
    .tab-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 0;
      border-radius: 0 0 8px 8px;
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .tab-panel[hidden] { display: none; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .table-wrap { overflow: auto; border: 1px solid var(--border); border-radius: 6px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 760px; }
    th, td { text-align: left; border-bottom: 1px solid var(--border); padding: 9px 10px; vertical-align: top; }
    th { color: var(--muted); font-size: 12px; font-weight: 700; background: var(--panel-soft); }
    tr:last-child td { border-bottom: 0; }
    .empty { padding: 24px; color: var(--muted); text-align: center; }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
      font-size: 12px;
      white-space: nowrap;
    }
    .badge.on { color: var(--accent); background: var(--accent-soft); border-color: #bddbd1; }
    .badge.off { color: var(--danger); background: var(--danger-soft); border-color: #f3b8b1; }
    .quota-grid { display: grid; gap: 2px; min-width: 145px; }
    .binding-list { display: flex; flex-wrap: wrap; gap: 5px; max-width: 360px; }
    .price-editor { display: grid; gap: 10px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .row.three { grid-template-columns: repeat(3, 1fr); }
    dialog {
      width: min(780px, calc(100vw - 32px));
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 20px 50px rgba(18, 25, 38, .22);
    }
    dialog form { padding: 18px; }
    dialog::backdrop { background: rgba(20, 27, 38, .38); }
    .dialog-head { margin-bottom: 16px; }
    .dialog-actions { justify-content: flex-end; margin-top: 14px; }
    @media (max-width: 820px) {
      .topbar { flex-direction: column; align-items: stretch; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .row, .row.three { grid-template-columns: 1fr; }
      .tab-panel { padding: 12px; }
      .app { padding: 14px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>CPA Access Manager</h1>
        <div class="muted">Key、分组、价格和用量管理</div>
      </div>
      <div class="actions">
        <span id="authStatus" class="status-pill"></span>
        <button class="primary" id="reload">刷新</button>
      </div>
    </header>

    <div id="msg"></div>

    <section class="summary" aria-label="概览">
      <div class="summary-item"><div class="summary-label">Keys</div><div class="summary-value" id="metricKeys">0</div></div>
      <div class="summary-item"><div class="summary-label">Groups</div><div class="summary-value" id="metricGroups">0</div></div>
      <div class="summary-item"><div class="summary-label">Prices</div><div class="summary-value" id="metricPrices">0</div></div>
      <div class="summary-item"><div class="summary-label">Usage</div><div class="summary-value" id="metricUsage">0</div></div>
    </section>

    <nav class="tabs" aria-label="管理视图">
      <button class="tab active" data-tab="keys">Keys</button>
      <button class="tab" data-tab="groups">Groups</button>
      <button class="tab" data-tab="prices">Prices</button>
      <button class="tab" data-tab="usage">Usage</button>
    </nav>

    <section id="tab-keys" class="tab-panel">
      <div class="section-head">
        <div>
          <h2>Keys</h2>
          <div class="muted">下游 Key、额度和资源绑定</div>
        </div>
        <button class="primary" id="newKey">新建 Key</button>
      </div>
      <div id="keys"></div>
    </section>

    <section id="tab-groups" class="tab-panel" hidden>
      <div class="section-head">
        <div>
          <h2>Groups</h2>
          <div class="muted">资源分组和成员绑定</div>
        </div>
        <button id="newGroup">新建分组</button>
      </div>
      <div id="groups"></div>
    </section>

    <section id="tab-prices" class="tab-panel" hidden>
      <div class="section-head">
        <div>
          <h2>Prices</h2>
          <div class="muted">按 provider + model 配置 USD 单价</div>
        </div>
        <button class="primary" id="savePrices">保存价格</button>
      </div>
      <div class="price-editor">
        <textarea id="pricesText" spellcheck="false" class="mono" placeholder='[{"provider":"codex","model":"gpt-5","input_usd_per_million":1.25,"output_usd_per_million":10,"cache_read_usd_per_million":0.125}]'></textarea>
      </div>
    </section>

    <section id="tab-usage" class="tab-panel" hidden>
      <div class="section-head">
        <div>
          <h2>Usage</h2>
          <div class="muted">最近 50 条计费账本</div>
        </div>
      </div>
      <div id="usage"></div>
    </section>
  </main>

  <dialog id="keyDialog">
    <form method="dialog">
      <div class="dialog-head">
        <h2>Key</h2>
        <div class="muted">设置启用状态、额度和绑定范围</div>
      </div>
      <input name="id" type="hidden">
      <div class="row">
        <div><label>名称</label><input name="name" placeholder="例如 Team A"></div>
        <div><label>状态</label><select name="enabled"><option value="true">启用</option><option value="false">禁用</option></select></div>
      </div>
      <div class="row three">
        <div><label>5 小时 USD 额度</label><input name="five" type="number" step="0.0001"></div>
        <div><label>7 天 USD 额度</label><input name="weekly" type="number" step="0.0001"></div>
        <div><label>总 USD 额度</label><input name="total" type="number" step="0.0001"></div>
      </div>
      <div>
        <label>绑定 JSON</label>
        <textarea name="bindings" class="mono" placeholder='[{"target_type":"group","target_id":"team-a"}]'></textarea>
      </div>
      <div class="actions dialog-actions"><button class="primary" id="saveKey">保存</button><button>取消</button></div>
    </form>
  </dialog>

  <dialog id="groupDialog">
    <form method="dialog">
      <div class="dialog-head">
        <h2>分组</h2>
        <div class="muted">把认证文件或供应商实例组织成授权目标</div>
      </div>
      <input name="original_id" type="hidden">
      <div class="row">
        <div><label>分组 ID</label><input name="id" placeholder="team-a"></div>
        <div><label>名称</label><input name="name" placeholder="Team A"></div>
      </div>
      <div>
        <label>描述</label>
        <textarea name="description" placeholder="可选"></textarea>
      </div>
      <div>
        <label>成员 JSON</label>
        <textarea name="members" class="mono" placeholder='[{"member_type":"provider_instance","member_id":"codex:auth-a"}]'></textarea>
      </div>
      <div class="actions dialog-actions"><button class="primary" id="saveGroup">保存</button><button>取消</button></div>
    </form>
  </dialog>

  <script>
    const api = "/v0/management/plugins/cpa-access-manager";
    const legacySecretStorageKey = "cpa-access-manager.management-key";
    const cpaAuthStorageKey = "cli-proxy-auth";
    const cpaSecurePrefix = "enc::v1::";
    const cpaSecureSalt = "cli-proxy-api-webui::secure-storage";
    const $ = (id) => document.getElementById(id);
    const state = { keys: [], groups: [], prices: [], usage: [] };
    const session = { apiBase: "", managementKey: "" };
    function base() { return session.apiBase || location.origin; }
    function secret() { return session.managementKey; }
    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch]));
    }
    function field(form, name) { return form.elements.namedItem(name); }
    function asString(value) { return typeof value === "string" ? value.trim() : ""; }
    function parseStoredJSON(value) {
      if (typeof value !== "string") return value;
      try { return JSON.parse(value); } catch { return value; }
    }
    function cpaSecureKeyBytes() {
      return new TextEncoder().encode(`${cpaSecureSalt}|${window.location.host}|${navigator.userAgent}`);
    }
    function base64ToBytes(value) {
      const text = atob(value);
      const bytes = new Uint8Array(text.length);
      for (let i = 0; i < text.length; i += 1) bytes[i] = text.charCodeAt(i);
      return bytes;
    }
    function xorBytes(bytes, key) {
      const out = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i += 1) out[i] = bytes[i] ^ key[i % key.length];
      return out;
    }
    function decodeCPASecureValue(raw) {
      if (!raw) return null;
      let text = raw;
      if (raw.startsWith(cpaSecurePrefix)) {
        const encrypted = base64ToBytes(raw.slice(cpaSecurePrefix.length));
        text = new TextDecoder().decode(xorBytes(encrypted, cpaSecureKeyBytes()));
      }
      return parseStoredJSON(text);
    }
    function readStorageValue(storage, key) {
      try {
        const raw = storage.getItem(key);
        return raw === null ? null : decodeCPASecureValue(raw);
      } catch {
        return null;
      }
    }
    function isEmbeddedInPanel() {
      try { return window.self !== window.top; } catch { return false; }
    }
    function extractPanelAuth(value) {
      if (!value || typeof value !== "object") return null;
      const stateValue = value.state && typeof value.state === "object" ? value.state : value;
      const apiBase = asString(stateValue.apiBase);
      const managementKey = asString(stateValue.managementKey);
      return apiBase && managementKey ? { apiBase, managementKey } : null;
    }
    function readCPAPanelAuth() {
      if (!isEmbeddedInPanel()) return null;
      const persisted = readStorageValue(window.localStorage, cpaAuthStorageKey);
      return extractPanelAuth(persisted);
    }
    function initSettings() {
      const panelAuth = readCPAPanelAuth();
      cleanupLegacySettings();
      session.apiBase = panelAuth?.apiBase || location.origin;
      session.managementKey = panelAuth?.managementKey || "";
      updateAuthStatus();
    }
    function cleanupLegacySettings() {
      try { localStorage.removeItem(legacySecretStorageKey); } catch {}
    }
    function updateAuthStatus() {
      const el = $("authStatus");
      el.textContent = secret() ? "已连接管理后台" : "未连接管理后台";
      el.classList.toggle("ok", !!secret());
    }
    async function call(path, opts = {}) {
      cleanupLegacySettings();
      const headers = Object.assign({"content-type":"application/json"}, opts.headers || {});
      if (secret()) headers.authorization = "Bearer " + secret();
      const res = await fetch(base() + api + path, Object.assign({}, opts, { headers }));
      const text = await res.text();
      let data; try { data = JSON.parse(text); } catch { data = text; }
      if (!res.ok) throw new Error((data && data.error) || text || res.status);
      return data;
    }
    async function verifyManagementSession() { await call("/status"); }
    function msg(text, err=false) { $("msg").innerHTML = text ? `<div class="notice ${err?'error':''}">${text}</div>` : ""; }
    function table(rows, cols, emptyText="暂无数据") {
      if (!Array.isArray(rows) || !rows.length) return `<div class="empty">${emptyText}</div>`;
      return `<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${c[0]}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${c[1](r) ?? ""}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
    }
    function setMetric(id, value) { $(id).textContent = String(value ?? 0); }
    function updateMetrics() {
      setMetric("metricKeys", state.keys.length);
      setMetric("metricGroups", state.groups.length);
      setMetric("metricPrices", state.prices.length);
      setMetric("metricUsage", state.usage.length);
    }
    async function load() {
      try {
        msg("");
        if (!secret()) {
          msg("没有找到可复用的管理登录。请从 CPA 管理后台的插件页面打开，且管理后台需要勾选记住密码。", true);
          return;
        }
        await verifyManagementSession();
        const [keys, groups, prices, usage] = await Promise.all([
          call("/keys"), call("/groups"), call("/prices"), call("/usage?limit=50")
        ]);
        Object.assign(state, { keys, groups, prices, usage });
        render();
      } catch (e) { msg(e.message, true); }
    }
    function render() {
      updateMetrics();
      $("keys").innerHTML = table(state.keys, [
        ["Key", r=>`<span class="mono">${esc(r.id)}</span><br><span class="muted">${esc(r.name||"")}</span>`],
        ["状态", r=>`<span class="badge ${r.enabled ? "on" : "off"}">${r.enabled ? "启用" : "禁用"}</span>`],
        ["额度", r=>`<div class="quota-grid"><span>5h ${Number(r.usage?.five_hour_usd||0).toFixed(4)} / ${esc(r.limits?.five_hour_limit_usd ?? "-")}</span><span>7d ${Number(r.usage?.weekly_usd||0).toFixed(4)} / ${esc(r.limits?.weekly_limit_usd ?? "-")}</span><span>总 ${Number(r.usage?.total_usd||0).toFixed(4)} / ${esc(r.limits?.total_limit_usd ?? "-")}</span></div>`],
        ["绑定", r=>`<div class="binding-list">${(r.bindings||[]).map(b=>`<span class="badge">${esc(b.target_type)}:${esc(b.target_id)}</span>`).join("") || "<span class='muted'>未绑定</span>"}</div>`],
        ["操作", r=>`<div class="actions"><button data-key-edit="${esc(r.id)}">编辑</button><button data-key-rotate="${esc(r.id)}">轮换</button><button class="danger" data-key-delete="${esc(r.id)}">删除</button></div>`]
      ]);
      $("groups").innerHTML = table(state.groups, [
        ["分组", r=>`<span class="mono">${esc(r.id)}</span><br><span>${esc(r.name||"")}</span>`],
        ["描述", r=>esc(r.description||"") || "<span class='muted'>无</span>"],
        ["成员", r=>`<div class="binding-list">${(r.members||[]).map(m=>`<span class="badge">${esc(m.member_type)}:${esc(m.member_id)}</span>`).join("") || "<span class='muted'>无成员</span>"}</div>`],
        ["操作", r=>`<div class="actions"><button data-group-edit="${esc(r.id)}">编辑</button><button class="danger" data-group-delete="${esc(r.id)}">删除</button></div>`]
      ]);
      $("pricesText").value = JSON.stringify(state.prices, null, 2);
      $("usage").innerHTML = table(state.usage, [
        ["时间", r=>esc(new Date(r.created_at).toLocaleString())],
        ["Key", r=>`<span class="mono">${esc(r.key_id)}</span>`],
        ["Provider", r=>esc(r.provider)],
        ["Model", r=>esc(r.model)],
        ["USD", r=>`<span class="mono">${Number(r.usd||0).toFixed(6)}</span>`]
      ]);
      bindTableActions();
    }
    function activateTab(name) {
      document.querySelectorAll("[data-tab]").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === name));
      document.querySelectorAll(".tab-panel").forEach(panel => panel.hidden = panel.id !== "tab-" + name);
    }
    document.querySelectorAll("[data-tab]").forEach(btn => btn.onclick = () => activateTab(btn.dataset.tab));
    $("reload").onclick = load;
    $("savePrices").onclick = async () => { try { await call("/prices", { method:"PUT", body: $("pricesText").value }); await load(); } catch(e) { msg(e.message, true); } };
    $("newKey").onclick = () => openKeyDialog();
    $("newGroup").onclick = () => openGroupDialog();
    function openKeyDialog(key) {
      const f = $("keyDialog").querySelector("form");
      f.reset();
      field(f, "id").value = key?.id || "";
      field(f, "name").value = key?.name || "";
      field(f, "enabled").value = key?.enabled === false ? "false" : "true";
      field(f, "five").value = key?.limits?.five_hour_limit_usd || "";
      field(f, "weekly").value = key?.limits?.weekly_limit_usd || "";
      field(f, "total").value = key?.limits?.total_limit_usd || "";
      field(f, "bindings").value = JSON.stringify(key?.bindings || [], null, 2);
      $("keyDialog").showModal();
    }
    function openGroupDialog(group) {
      const f = $("groupDialog").querySelector("form");
      f.reset();
      field(f, "original_id").value = group?.id || "";
      field(f, "id").value = group?.id || "";
      field(f, "name").value = group?.name || "";
      field(f, "description").value = group?.description || "";
      field(f, "members").value = JSON.stringify(group?.members || [], null, 2);
      $("groupDialog").showModal();
    }
    function bindTableActions() {
      document.querySelectorAll("[data-key-edit]").forEach(btn => btn.onclick = () => openKeyDialog(state.keys.find(k => k.id === btn.dataset.keyEdit)));
      document.querySelectorAll("[data-key-rotate]").forEach(btn => btn.onclick = () => rotateKey(btn.dataset.keyRotate));
      document.querySelectorAll("[data-key-delete]").forEach(btn => btn.onclick = () => deleteKey(btn.dataset.keyDelete));
      document.querySelectorAll("[data-group-edit]").forEach(btn => btn.onclick = () => openGroupDialog(state.groups.find(g => g.id === btn.dataset.groupEdit)));
      document.querySelectorAll("[data-group-delete]").forEach(btn => btn.onclick = () => deleteGroup(btn.dataset.groupDelete));
    }
    $("saveKey").onclick = async (ev) => {
      ev.preventDefault();
      const f = $("keyDialog").querySelector("form");
      const bindingsRaw = field(f, "bindings").value.trim();
      const payload = {
        name: field(f, "name").value,
        enabled: field(f, "enabled").value === "true",
        five_hour_limit_usd: field(f, "five").value ? Number(field(f, "five").value) : null,
        weekly_limit_usd: field(f, "weekly").value ? Number(field(f, "weekly").value) : null,
        total_limit_usd: field(f, "total").value ? Number(field(f, "total").value) : null,
        bindings: bindingsRaw ? JSON.parse(bindingsRaw) : []
      };
      try {
        const id = field(f, "id").value.trim();
        const out = id
          ? await call("/keys?id=" + encodeURIComponent(id), { method:"PATCH", body: JSON.stringify(payload) })
          : await call("/keys", { method:"POST", body: JSON.stringify(payload) });
        $("keyDialog").close();
        if (out.plain_key) msg("新 Key 只显示一次：\n" + out.plain_key);
        await load();
      } catch(e) { msg(e.message, true); }
    };
    $("saveGroup").onclick = async (ev) => {
      ev.preventDefault();
      const f = $("groupDialog").querySelector("form");
      const id = field(f, "original_id").value.trim();
      const payload = {
        id: field(f, "id").value.trim(),
        name: field(f, "name").value.trim(),
        description: field(f, "description").value.trim(),
        members: field(f, "members").value.trim() ? JSON.parse(field(f, "members").value) : []
      };
      try {
        await call(id ? "/groups?id=" + encodeURIComponent(id) : "/groups", { method: id ? "PATCH" : "POST", body: JSON.stringify(payload) });
        $("groupDialog").close();
        await load();
      } catch(e) { msg(e.message, true); }
    };
    async function rotateKey(id) {
      try {
        const out = await call("/keys/rotate?id=" + encodeURIComponent(id), { method:"POST" });
        msg("新 Key 只显示一次：\n" + out.plain_key);
        await load();
      } catch(e) { msg(e.message, true); }
    }
    async function deleteKey(id) {
      if (!confirm("删除这个 Key？")) return;
      try { await call("/keys?id=" + encodeURIComponent(id), { method:"DELETE" }); await load(); } catch(e) { msg(e.message, true); }
    }
    async function deleteGroup(id) {
      if (!confirm("删除这个分组？")) return;
      try { await call("/groups?id=" + encodeURIComponent(id), { method:"DELETE" }); await load(); } catch(e) { msg(e.message, true); }
    }
    initSettings();
    if (secret()) load();
  </script>
</body>
</html>
